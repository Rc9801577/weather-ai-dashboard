<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather AI Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .container {
            text-align: center;
            padding: 30px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            animation: fadeIn 1s ease-in;
        }

        input {
            padding: 12px;
            width: 250px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .card {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: inline-block;
            min-width: 250px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        table {
            margin: 30px auto;
            width: 85%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        th {
            background: rgba(255,255,255,0.1);
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="container">

   <h1>🌦 Weather AI Dashboard</h1>

<input type="text" id="city" placeholder="Enter city">
<button onclick="getWeather()">Search</button>

<div id="result">Search weather to see results 🌍</div>

    <h2>📊 Weather History</h2>

    <table>
        <thead>
            <tr>
                <th>City</th>
                <th>Temperature</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>

    <div class="footer">
        Built with FastAPI + Render 🚀
    </div>

</div>

<script>
const API = "https://weather-ai-dashboard.onrender.com";

async function getWeather() {
    let city = document.getElementById("city").value;

    if (!city) {
        alert("Please enter city");
        return;
    }

    let res = await fetch(`${API}/weather?city=${city}`);
    let data = await res.json();

    document.getElementById("result").innerHTML =
        `🌍 <b>${data.city}</b><br>🌡 ${data.temperature}°C`;

    loadHistory();
}

async function loadHistory() {
    let res = await fetch(`${API}/history`);
    let data = await res.json();

    let table = document.getElementById("history");
    table.innerHTML = "";

    data.reverse().forEach(item => {
        table.innerHTML += `
            <tr>
                <td>${item.city}</td>
                <td>${item.temperature}°C</td>
                <td>${item.time}</td>
            </tr>
        `;
    });
}

loadHistory();
</script>
<script>
console.log("JS loaded");
</script>

</body>
</html>
