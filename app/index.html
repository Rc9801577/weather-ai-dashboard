<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather AI Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            width: 250px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #0072ff;
        }

        .card {
            margin-top: 30px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            min-width: 250px;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid white;
        }

        th {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🌦 Weather AI Dashboard</h1>

    <input type="text" id="city" placeholder="Enter city">
    <button onclick="getWeather()">Search</button>

    <div class="card" id="result">Weather will appear here</div>

    <h2>📊 History</h2>

    <table>
        <thead>
            <tr>
                <th>City</th>
                <th>Temperature</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>

</div>

<script>
const API = "https://weather-ai-dashboard.onrender.com";

async function getWeather() {
    let city = document.getElementById("city").value;

    let res = await fetch(`${API}/weather?city=${city}`);
    let data = await res.json();

    document.getElementById("result").innerHTML =
        `🌍 City: ${data.city} <br> 🌡 Temp: ${data.temperature}°C`;

    loadHistory();
}

async function loadHistory() {
    let res = await fetch(`${API}/history`);
    let data = await res.json();

    let table = document.getElementById("history");
    table.innerHTML = "";

    data.forEach(item => {
        table.innerHTML += `
            <tr>
                <td>${item.city}</td>
                <td>${item.temperature}</td>
                <td>${item.time}</td>
            </tr>
        `;
    });
}

loadHistory();
</script>

</body>
</html>
